<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="this is a calculator app built with html, css and javascript">
    <meta name="keywords" content="calculator html css javascript">
    <meta name="author" content="Colzy">
    <title>calculator</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="display">
            0
        </div>
        <div class="buttons">
            <div class="num">
                <button class="btn-num">1</button>
                <button class="btn-num">2</button>
                <button class="btn-num">3</button>
                <button class="btn-num">4</button>
                <button class="btn-num">5</button>
                <button class="btn-num">6</button>
                <button class="btn-num">7</button>
                <button class="btn-num">8</button>
                <button class="btn-num">9</button>
                <button class="btn-num">C</button>
                <button class="btn-num">0</button>
                <button class="btn-num">=</button>
            </div>
            <div class="keys">
                <button class="func-keys">+</button>
                <button class="func-keys">-</button>
                <button class="func-keys">*</button>
                <button class="func-keys">/</button>
                <button class="func-keys">%</button>
            </div>
        </div>
    </div>
</body>
</html>
